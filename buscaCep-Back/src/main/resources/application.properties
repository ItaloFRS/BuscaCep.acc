spring.application.name=buscaCep

# --- ConfigurańŃo do Banco de Dados H2 ---

spring.datasource.url=jdbc:h2:mem:cepdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa

# A senha padrŃo ķ vazia

spring.datasource.password=

# --- ConfigurańŃo do JPA/Hibernate ---

# Define o "dialeto" do H2 para o Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 'update': Cria ou atualiza as tabelas automaticamente com base nas suas Entidades
spring.jpa.hibernate.ddl-auto=update

# --- Console H2 ---

# Habilita o console web do H2
spring.h2.console.enabled=true
# Define o caminho para acessar o console (ex: http://localhost:8080/h2-console)
spring.h2.console.path=/h2-console